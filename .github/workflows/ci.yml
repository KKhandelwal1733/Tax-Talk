name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (locked)
        run: uv sync --frozen --extra dev

      - name: Lint check
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Type check
        run: uv run mypy src
        continue-on-error: true

      - name: Run tests
        env:
          # Mock variables required by pydantic-settings to bypass validation errors during testing
          ENV: "test"
          HF_TOKEN: "mock-hf-token-for-ci"
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_JWT_ISSUER: "https://mock.supabase.co/auth/v1"
          SUPABASE_JWT_AUDIENCE: "authenticated"
          QDRANT_URL: "http://localhost:6333"
          LANGFUSE_PUBLIC_KEY: "" 
        run: uv run pytest -v