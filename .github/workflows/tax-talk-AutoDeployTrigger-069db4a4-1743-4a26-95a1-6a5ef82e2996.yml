name: Trigger auto deployment for tax-talk

on:
  # Waits for the 'CI' workflow to finish before triggering
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: 
      - main

  # Allows you to manually trigger a deployment from the GitHub Actions tab
  workflow_dispatch:      

jobs:
  build-and-deploy:
    # CRITICAL: Only proceed if the CI tests passed, OR if triggered manually
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions: 
      id-token: write 
      contents: read 

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TAXTALK_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TAXTALK_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TAXTALK_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: taxtalk-b5a6hqbaare6e5e6.azurecr.io
          registryUsername: ${{ secrets.TAXTALK_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.TAXTALK_REGISTRY_PASSWORD }}
          containerAppName: tax-talk
          resourceGroup: tax-talk-rg
          imageToBuild: taxtalk-b5a6hqbaare6e5e6.azurecr.io/tax-talk:${{ github.sha }}