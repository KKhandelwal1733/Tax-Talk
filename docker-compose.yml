services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: tax-talk-api:latest
    container_name: tax-talk-api
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8000}
      # Removed the internal docker hostname fallback since Qdrant is now in the cloud
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-gst_income_tax_contextual}
      # Note: Assuming gemini-1.5-flash unless you have early access to 3.1!
      CHAT_MODEL: ${CHAT_MODEL:-gemini-3.1-flash-lite}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-production}
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          # CRITICAL: Capped at 750m to leave ~250m for Ubuntu OS and Docker daemon
          memory: 750m
          cpus: "1.0"
        reservations:
          memory: 256m
          cpus: "0.25"
    networks:
      - tax-talk-net

networks:
  tax-talk-net:
    driver: bridge